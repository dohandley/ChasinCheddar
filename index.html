function stats(){const allRes=rS(),res=allRes.filter(p=>p.list==='best_bets'),hits=res.filter(p=>p.hit),tp=tS();const wr=res.length?Math.round(hits.length/res.length*100):0;
  let w=res.length*10,ret=0;hits.forEach(p=>{const o=p.best_odds;ret+=o>0?10+10*o/100:10+10*100/Math.abs(o)});const roi=w?Math.round((ret-w)/w*100):0;

  const bS={Over:{t:0,h:0},Under:{t:0,h:0}};allRes.forEach(p=>{const k=(p.side||'Over')[0].toUpperCase()+(p.side||'over').slice(1).toLowerCase();if(bS[k]){bS[k].t++;if(p.hit)bS[k].h++}});

function lR(p,i){const isUnder=(p.side||'').toLowerCase()==='under';const sc=isUnder?'pp-u':'pp-o';const sideLabel=isUnder?'Under':'Over';const ec=p.ev>=12?'evh':p.ev>=5?'evw':'evc';const gc=GM[p.grade.toLowerCase()]||'gc',rc=i<=3?`rk-${i}`:p.grade==='S'?'rk-s':p.grade==='A'?'rk-a':p.grade==='B'?'rk-b':'rk-c';const m=i===1?'🥇':i===2?'🥈':i===3?'🥉':i;const sclr=p.score>=68?'var(--amber)':p.score>=52?'var(--green)':p.score>=38?'var(--blue)':'var(--text-4)';const tc=p.resolved?(p.hit?'hx':'rx'):'';const confBadge=p.confirmed?'<span class="cf">CONF</span>':'';

  <div class="cg"><div class="ch"><div class="ct">Win Rate by Grade</div><div class="bar-chart">${['S','A','B','C'].map(g=>{const d=st.bG[g]||{t:0,h:0};const w=d.t?Math.round(d.h/d.t*100):0;const mx=Math.max(...['S','A','B','C'].map(x=>(st.bG[x]||{t:0}).t),1);const c=g==='S'?'var(--amber)':g==='A'?'var(--green)':g==='B'?'var(--blue)':'var(--text-4)';return`<div class="bar-c"><div class="bar-v">${w}%</div><div class="bar" style="height:${Math.max(4,d.t/mx*85)}px;background:${c}"></div><div class="bar-l">${g} (${d.t})</div></div>`}).join('')}</div></div><div class="ch"><div class="ct">Daily P/L</div><div class="bar-chart">${Object.keys(st.bbPL).sort().slice(-10).map(d=>{const v=st.bbPL[d];const mx=Math.max(...Object.values(st.bbPL).map(Math.abs),10);return`<div class="bar-c"><div class="bar-v" style="color:${v>=0?'var(--green-text)':'var(--red-text)'}">$${v>=0?'+':''}${Math.round(v)}</div><div class="bar" style="height:${Math.max(4,Math.abs(v)/mx*85)}px;background:${v>=0?'var(--green)':'var(--red)'}"></div><div class="bar-l">${fD(d,1)}</div></div>`}).join('')}</div></div></div>`}

function pgA(st){const sp=SP[S.sp];if(!st.total)return`<div class="card" style="text-align:center;padding:40px"><div style="color:var(--text-3)">Need resolved ${sp.l} picks.</div><br><button class="btn" onclick="loadD()">Load Demo</button></div>`;
  const B=(v,l,s,c)=>`<div><div style="font-size:2rem;font-weight:800;color:${c};letter-spacing:-.03em">${v}%</div><div style="font-size:10px;color:var(--text-4);font-family:'JetBrains Mono',monospace;margin-top:4px">${l} · ${s}</div></div>`;const oW=st.bS.Over.t?Math.round(st.bS.Over.h/st.bS.Over.t*100):0,uW=st.bS.Under.t?Math.round(st.bS.Under.h/st.bS.Under.t*100):0;const bbW=st.bL.best_bets.t?Math.round(st.bL.best_bets.h/st.bL.best_bets.t*100):0,ltW=st.bL.lotto.t?Math.round(st.bL.lotto.h/st.bL.lotto.t*100):0;
  const evB={'0-5':{t:0,h:0},'5-10':{t:0,h:0},'10-15':{t:0,h:0},'15+':{t:0,h:0}};rS().forEach(p=>{const k=p.ev>=15?'15+':p.ev>=10?'10-15':p.ev>=5?'5-10':'0-5';evB[k].t++;if(p.hit)evB[k].h++});const mkts=Object.entries(st.bM).sort((a,b)=>b[1].t-a[1].t);
  return`<div class="cg"><div class="ch"><div class="ct">Over vs Under</div><div style="display:grid;grid-template-columns:1fr 1fr;text-align:center;padding:12px 0">${B(oW,'OVER',st.bS.Over.t+' bets','var(--blue-text)')}${B(uW,'UNDER',st.bS.Under.t+' bets','var(--gold-text)')}</div></div><div class="ch"><div class="ct">Best Bets vs Lotto</div><div style="display:grid;grid-template-columns:1fr 1fr;text-align:center;padding:12px 0">${B(bbW,'BEST BETS',st.bL.best_bets.t,'var(--amber-text)')}${B(ltW,'LOTTO',st.bL.lotto.t,'var(--blue-text)')}</div></div></div>
  <div class="cg"><div class="ch"><div class="ct">Confirmed vs Single</div><div style="display:grid;grid-template-columns:1fr 1fr;text-align:center;padding:12px 0">${B(st.cW,'CONFIRMED',st.cN,'var(--green-text)')}${B(st.nW,'SINGLE',st.nN,'var(--text-3)')}</div></div><div class="ch"><div class="ct">Win Rate by EV</div><div class="tw" style="border:none"><table><thead><tr><th>EV Range</th><th>Bets</th><th>Win %</th></tr></thead><tbody>${Object.entries(evB).map(([r,d])=>{const w=d.t?Math.round(d.h/d.t*100):0;return`<tr><td style="font-family:'JetBrains Mono',monospace;font-weight:700">${r}%</td><td>${d.t}</td><td style="color:${w>=55?'var(--green-text)':w>=45?'var(--amber-text)':'var(--red-text)'}"><strong>${w}%</strong></td></tr>`}).join('')}</tbody></table></div></div></div>
  <div class="card"><div class="ct">${sp.e} Market Breakdown</div><div class="tw"><table><thead><tr><th>Market</th><th>Total</th><th>Hits</th><th>Win %</th><th style="width:28%">Accuracy</th></tr></thead><tbody>${mkts.map(([m,d])=>{const w=d.t?Math.round(d.h/d.t*100):0;return`<tr><td style="font-weight:700;color:var(--blue-text)">${m}</td><td>${d.t}</td><td>${d.h}</td><td style="color:${w>=55?'var(--green-text)':w>=45?'var(--amber-text)':'var(--red-text)'}"><strong>${w}%</strong></td><td><div style="width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="width:${w}%;height:100%;border-radius:2px;background:${w>=55?'var(--green)':w>=45?'var(--amber)':'var(--red)'}"></div></div></td></tr>`}).join('')}</tbody></table></div></div>`}

window.setF=(k,v)=>{S[k]=k==='f'?v.toLowerCase():v;sv();render()};
window.mr=(id,hit)=>{for(const d of Object.values(S.days)){const p=(d.picks||[]).find(p=>p.id===id);if(p){p.resolved=true;p.hit=hit;break}}sv();render();toast(hit===true?'✓ Hit!':hit===false?'✗ Miss':'— Push')};
window.ur=id=>{for(const d of Object.values(S.days)){const p=(d.picks||[]).find(p=>p.id===id);if(p){p.resolved=false;p.hit=null;break}}sv();render()};
window.loadD=()=>{S.days=genD();sv();render();toast('Demo loaded — 14 days!')};

window.clrSport=sp=>{const label=SP[sp]?.l||sp.toUpperCase();const other=sp==='nba'?'MLB':'NBA';if(!confirm(`Clear all ${label} picks? ${other} data will NOT be affected.`))return;let removed=0;for(const d of Object.keys(S.days)){const before=S.days[d].picks?.length||0;S.days[d].picks=(S.days[d].picks||[]).filter(p=>(p.sport||'nba')!==sp);removed+=before-(S.days[d].picks?.length||0);if(!S.days[d].picks.length)delete S.days[d]}sv();document.getElementById('imp')?.remove();render();toast(`Cleared ${removed} ${label} picks`)};

window.showImp=()=>{const m=document.createElement('div');m.className='mbg';m.id='imp';m.onclick=e=>{if(e.target===m)m.remove()};
  const sportCounts=sC();
  const clearBtns=Object.entries(SP).map(([k,v])=>{const n=sportCounts[k]||0;return n?`<button class="btn btn-d" onclick="clrSport('${k}')">${v.e} Clear ${v.l} (${n})</button>`:''}).filter(Boolean).join('');
  m.innerHTML=`<div class="mdl"><h3>Import Picks</h3>
    <div class="callout">Paste <strong>picks_log.json</strong> or <strong>picks_log_mlb.json</strong> contents, or upload the file directly. Tracker results auto-import.</div>
    <div id="dropzone" style="border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px;transition:all .15s" onclick="document.getElementById('filepick').click()" ondragover="event.preventDefault();this.style.borderColor='var(--green)';this.style.background='var(--green-bg)'" ondragleave="this.style.borderColor='var(--border)';this.style.background='transparent'" ondrop="event.preventDefault();this.style.borderColor='var(--border)';this.style.background='transparent';handleFile(event.dataTransfer.files[0])">
      <div style="font-size:1.3rem;margin-bottom:6px">📂</div><div style="font-weight:700;font-size:12px;color:var(--text-2)">Drop JSON file here or click to browse</div><div style="font-size:11px;color:var(--text-4);margin-top:3px">picks_log.json · picks_log_mlb.json</div>
      <input type="file" id="filepick" accept=".json" style="display:none" onchange="handleFile(this.files[0])"></div>
    <div style="text-align:center;color:var(--text-4);font-size:10px;font-weight:600;letter-spacing:.1em;margin-bottom:8px">OR PASTE MANUALLY</div>
    <textarea id="id" placeholder="Paste JSON here..." style="min-height:120px"></textarea>
    <div style="display:flex;gap:6px;margin-top:10px"><button class="btn-p btn" onclick="doImp()" style="flex:1">Import</button><button class="btn" onclick="document.getElementById('imp').remove()">Cancel</button></div>
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
      <div style="font-size:9px;font-weight:700;color:var(--text-4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px">Data Management</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${clearBtns}<button class="btn" onclick="loadD()">Load Demo</button><button class="btn btn-d" onclick="clr()">Clear All</button></div></div></div>`;
  document.body.appendChild(m)};
window.handleFile=f=>{if(!f)return;const r=new FileReader();r.onload=e=>{const ta=document.getElementById('id');if(ta)ta.value=e.target.result;document.getElementById('dropzone').innerHTML=`<div style="color:var(--green-text);font-weight:700;font-size:12px">✓ ${f.name} loaded</div><div style="font-size:11px;color:var(--text-4);margin-top:2px">Click Import to continue</div>`};r.readAsText(f)};
window.doImp=()=>{const raw=document.getElementById('id')?.value;if(!raw?.trim()){toast('Paste JSON first');return}
  try{let data=JSON.parse(raw);if(!Array.isArray(data)){if(typeof data==='object'){const p=[];Object.values(data).forEach(v=>{if(Array.isArray(v))p.push(...v);else if(v?.picks)p.push(...v.picks)});data=p}}
  if(!data.length){toast('No picks found');return}
  function nH(h,r){if(!r)return{hit:null,resolved:false};if(h==='win'||h===true)return{hit:true,resolved:true};if(h==='loss'||h===false)return{hit:false,resolved:true};return{hit:null,resolved:true}}
  let rc=0;const byD={};
  data.forEach((p,i)=>{const d=p.date||td();if(!byD[d])byD[d]=[];let gr=p.grade||(p.score>=68?'S':p.score>=52?'A':p.score>=38?'B':'C');gr=gr.replace(/[🔥✅⚠️📊⭐\s]+/g,'').trim()||'C';if(gr==='FIRE')gr='S';if(gr==='SOLID')gr='A';if(gr==='LEAN')gr='B';const{hit,resolved}=nH(p.hit,p.resolved);if(resolved)rc++;let list=p.list||(Math.abs(p.best_odds||0)>=300?'lotto':'best_bets');if(list==='lotto_plays')list='lotto';
    byD[d].push({id:p.id||`${d}-${p.sport||S.sp}-${i}`,sport:p.sport||S.sp,player:p.player||'?',game:p.game||'',game_time:p.game_time||'',market:p.market||'',side:p.side||'Over',line:p.line||0,best_odds:p.best_odds||0,best_book:p.best_book||'',ev:p.ev||0,kelly:p.kelly||0,coverage:p.coverage||0,score:p.score||0,grade:gr,list,dvp:p.dvp||0,boost:p.boost||1,proj_edge:p.proj_edge||0,confirmed:p.confirmed||false,actual_stat:p.actual_stat||null,hit,resolved,date:d,rank:p.rank||i+1})});
  Object.entries(byD).forEach(([d,picks])=>{if(S.days[d]){const ex=S.days[d].picks||[];const eM={};ex.forEach(p=>{eM[p.player+'|'+p.market+'|'+p.side+'|'+p.line+'|'+p.date]=p});picks.forEach(p=>{const k=p.player+'|'+p.market+'|'+p.side+'|'+p.line+'|'+p.date;if(eM[k]){if(p.resolved){eM[k].resolved=p.resolved;eM[k].hit=p.hit;eM[k].actual_stat=p.actual_stat}}else ex.push(p)});S.days[d].picks=ex}else S.days[d]={picks,imported:Date.now()};
    ['nba','mlb'].forEach(sp=>{['best_bets','lotto'].forEach(ls=>{const g=S.days[d].picks.filter(p=>p.sport===sp&&p.list===ls).sort((a,b)=>b.score-a.score);g.forEach((p,i)=>p.rank=i+1)})})});
  sv();document.getElementById('imp')?.remove();render();toast(`Imported ${data.length} picks${rc?' ('+rc+' resolved)':''}!`)}catch(e){toast('Invalid JSON');console.error(e)}};
window.clr=()=>{if(!confirm('Clear ALL data (NBA + MLB)?'))return;S.days={};sv();document.getElementById('imp')?.remove();render();toast('Cleared all data')};
render();
</script>
</body>
</html>
