<script>
const LS='cc7';
const FB_CFG={apiKey:"YOUR_API_KEY"};const FB_ON=!FB_CFG.apiKey.startsWith('YOUR');
const SP={nba:{e:'🏀',l:'NBA'},mlb:{e:'⚾',l:'MLB'}};
const GM={s:'gs',a:'ga',b:'gb',c:'gc'};
let S={v:'picks',sp:'nba',scope:'bb',unit:10,f:'all',q:'',sf:'all',lf:'all',days:{},theme:'light'};
function ld(){try{const d=JSON.parse(localStorage.getItem(LS));if(d)S={...S,...d}}catch(e){}}
function sv(){localStorage.setItem(LS,JSON.stringify(S))}
ld();document.documentElement.setAttribute('data-theme',S.theme||'light');
// ═══ DEDUP ON LOAD: remove duplicate picks from prior bad imports ═══
(function dedup(){let total=0;Object.keys(S.days).forEach(d=>{const pk=S.days[d].picks;if(!pk||!pk.length)return;const seen={};const clean=[];pk.forEach(p=>{const k=(p.player||'').toLowerCase().trim()+'|'+(p.market||'').toLowerCase().trim().replace(/[_\s]+/g,' ')+'|'+(p.side||'').toLowerCase()+'|'+(p.line||0)+'|'+p.date+'|'+(p.sport||'nba');if(seen[k]){const prev=seen[k];if(p.resolved&&!prev.resolved){const idx=clean.indexOf(prev);clean[idx]=p;seen[k]=p}total++}else{seen[k]=p;clean.push(p)}});S.days[d].picks=clean;['nba','mlb'].forEach(sp=>{['best_bets','lotto'].forEach(ls=>{const GO={S:0,A:1,B:2,C:3};const g=clean.filter(p=>p.sport===sp&&p.list===ls).sort((a,b)=>{if(ls==='best_bets'){const ga=GO[a.grade]!=null?GO[a.grade]:3;const gb=GO[b.grade]!=null?GO[b.grade]:3;if(ga!==gb)return ga-gb}return b.score-a.score});g.forEach((p,i)=>p.rank=i+1)})})});if(total){sv();console.log(`Dedup: removed ${total} duplicate picks`)}})();
const td=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const fD=(d,s)=>{const t=new Date(d+'T12:00:00');return s?t.toLocaleDateString('en-US',{month:'short',day:'numeric'}):t.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})};
const fO=v=>!v||v===0?'—':v>0?`+${v}`:`${v}`;
const fTime=t=>{if(!t)return'';const s=String(t).trim();if(/[ap]m/i.test(s))return s.replace(/\s*(ET|EST|EDT)$/i,'').trim()+' ET';const mt=s.match(/^(\d{1,2}):(\d{2})/);if(!mt)return s;let h=parseInt(mt[1]),min=mt[2],ampm='AM';if(h>=12){ampm='PM';if(h>12)h-=12}if(h===0)h=12;return`${h}:${min} ${ampm} ET`};
const sP=dp=>(dp||[]).filter(p=>(p.sport||'nba')===S.sp);
const aS=()=>Object.values(S.days).flatMap(d=>sP(d.picks));
const rS=()=>aS().filter(p=>p.resolved);
const tS=()=>sP((S.days[td()]||{picks:[]}).picks);
const sC=()=>{const c={};Object.values(S.days).forEach(d=>(d.picks||[]).forEach(p=>{const s=p.sport||'nba';c[s]=(c[s]||0)+1}));return c};

// ═══ NORMALIZE HELPERS FOR ROBUST MATCHING ═══
// Lowercase, trim, collapse whitespace/underscores so "batter_total_bases" matches "Batter Total Bases"
const nK=s=>(s||'').toString().toLowerCase().trim().replace(/[_\s]+/g,' ');
// Key 1: player + market + side + date (strict)
const mK=p=>nK(p.player)+'|'+nK(p.market)+'|'+nK(p.side)+'|'+(p.line||0)+'|'+p.date;
// Key 2: player + market + date (side might differ between over/under)
const mK2=p=>nK(p.player)+'|'+nK(p.market)+'|'+p.date;

    return`<tr class="day-row" onclick="toggleDay('${d}')" style="cursor:pointer"><td style="font-weight:700">${it?'Today':fD(d)} <span id="arrow-${d}" style="font-size:10px;color:var(--text-4);margin-left:4px">▶</span></td><td>${pk.length}</td><td>${res.length?`<span style="color:${wr>=55?'var(--green-text)':wr>=45?'var(--amber-text)':'var(--red-text)'}"><strong>${wr}%</strong></span>`:'—'}</td><td>${hit.length}-${res.length-hit.length}</td><td style="color:var(--green-text);font-family:'JetBrains Mono',monospace;font-size:12px">+${ae}%</td><td><span class="gr ${GM[tg.toLowerCase()]||'gc'}" style="font-size:9px;padding:2px 6px">${tg}</span></td><td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${pl>=0?'var(--green-text)':'var(--red-text)'}">$${pl>=0?'+':''}${Math.round(pl)}</td></tr>${detailRows}`}).join('');
  return`<div class="ct">${sp.e} ${sp.l} History · ${ds.length} days</div><div class="tw"><table><thead><tr><th>Date</th><th>Picks</th><th>Win %</th><th>W-L</th><th>Avg EV</th><th>Top</th><th>P/L</th></tr></thead><tbody>${rows}</tbody></table></div>`}

function pgPf(st){const sp=SP[S.sp];if(!st.allDec)return`<div class="card" style="text-align:center;padding:40px"><div style="color:var(--text-3)">No resolved ${sp.l} picks yet.</div><br><button class="btn" onclick="loadD()">Load Demo</button></div>`;

  return`<div class="cg">${overall}${donut}</div><div class="cg">${bySection}</div><div class="cg">${byGrade}${gradeChart}</div>${dailyBreakdown}${plChart}`}

function pgA(st){const sp=SP[S.sp];if(!st.total)return`<div class="card" style="text-align:center;padding:40px"><div style="color:var(--text-3)">Need resolved ${sp.l} picks.</div><br><button class="btn" onclick="loadD()">Load Demo</button></div>`;

window.doImp=()=>{const raw=document.getElementById('id')?.value;if(!raw?.trim()){toast('Paste JSON first');return}
  try{let data=JSON.parse(raw);if(!Array.isArray(data)){if(typeof data==='object'){const p=[];Object.values(data).forEach(v=>{if(Array.isArray(v))p.push(...v);else if(v?.picks)p.push(...v.picks)});data=p}}
  if(!data.length){toast('No picks found');return}
  function nH(h,r){if(!r)return{hit:null,resolved:false};if(h==='win'||h===true)return{hit:true,resolved:true};if(h==='loss'||h===false)return{hit:false,resolved:true};if(h==='dnp')return{hit:'dnp',resolved:true};if(h==='push')return{hit:'push',resolved:true};return{hit:null,resolved:true}}
  let rc=0,matched=0;const byD={};
  data.forEach((p,i)=>{const d=p.date||td();if(!byD[d])byD[d]=[];let gr=p.grade||(p.score>=68?'S':p.score>=52?'A':p.score>=38?'B':'C');gr=gr.replace(/[🔥✅⚠️📊⭐\s]+/g,'').trim()||'C';if(gr==='FIRE')gr='S';if(gr==='SOLID')gr='A';if(gr==='LEAN')gr='B';const{hit,resolved}=nH(p.hit,p.resolved);if(resolved)rc++;let list=p.list||(Math.abs(p.best_odds||0)>=300?'lotto':'best_bets');if(list==='lotto_plays')list='lotto';
    byD[d].push({id:p.id||`${d}-${p.sport||S.sp}-${i}`,sport:p.sport||S.sp,player:p.player||'?',game:p.game||'',game_time:p.game_time||'',market:p.market||'',side:p.side||'Over',line:p.line||0,best_odds:p.best_odds||0,best_book:p.best_book||'',ev:p.ev||0,kelly:p.kelly||0,coverage:p.coverage||0,score:p.score||0,grade:gr,list,dvp:p.dvp||0,boost:p.boost||1,proj_edge:p.proj_edge||0,confirmed:p.confirmed||false,actual_stat:p.actual_stat||null,hit,resolved,date:d,rank:p.rank||i+1})});

  // ═══ DEDUP INCOMING: remove duplicates within the JSON file itself ═══
  let dupes=0;
  Object.keys(byD).forEach(d=>{const seen={};const clean=[];
    byD[d].forEach(p=>{const k=nK(p.player)+'|'+nK(p.market)+'|'+nK(p.side)+'|'+(p.line||0)+'|'+p.date+'|'+(p.sport||'nba');
      if(seen[k]){dupes++;const prev=seen[k];if(p.resolved&&!prev.resolved){const idx=clean.indexOf(prev);clean[idx]=p;seen[k]=p}}
      else{seen[k]=p;clean.push(p)}});
    byD[d]=clean});

  // ═══ ROBUST MERGE: 3-tier normalized matching ═══
  Object.entries(byD).forEach(([d,picks])=>{if(S.days[d]){const ex=S.days[d].picks||[];
    // Build 3 lookup maps from EXISTING picks (most specific → least)
    const eM1={},eM2={},eM3={};
    ex.forEach(p=>{
      eM1[mK(p)]=p;                    // player+market+side+date (normalized)
      const k2=mK2(p);if(!eM2[k2])eM2[k2]=p;  // player+market+date
      const k3=mK3(p);if(!eM3[k3])eM3[k3]=p;  // player+date+line
    });
    const used=new Set();
    picks.forEach(p=>{
      // Try exact match first (player+market+side+date, all normalized/lowercased)
      let found=eM1[mK(p)];
      // Fallback 2: player+market+date (side might be capitalized differently or missing)
      if(!found){found=eM2[mK2(p)]}
      // Fallback 3: player+date+line (market name format might differ entirely, e.g. "batter_total_bases" vs "TB")
      if(!found){found=eM3[mK3(p)]}
      if(found&&!used.has(found.id)){
        used.add(found.id);matched++;
        // Update resolved status if incoming is resolved
        if(p.resolved){found.resolved=p.resolved;found.hit=p.hit;found.actual_stat=p.actual_stat}
        // Backfill missing fields
        if(!found.game&&p.game)found.game=p.game;
        if(!found.game_time&&p.game_time)found.game_time=p.game_time;
        if(p.score&&p.score>found.score)found.score=p.score;
      }else if(!found){ex.push(p)}
    });S.days[d].picks=ex}else S.days[d]={picks,imported:Date.now()};
    ['nba','mlb'].forEach(sp=>{['best_bets','lotto'].forEach(ls=>{const GO={S:0,A:1,B:2,C:3};const g=S.days[d].picks.filter(p=>p.sport===sp&&p.list===ls).sort((a,b)=>{if(ls==='best_bets'){const ga=GO[a.grade]!=null?GO[a.grade]:3;const gb=GO[b.grade]!=null?GO[b.grade]:3;if(ga!==gb)return ga-gb}return b.score-a.score});g.forEach((p,i)=>p.rank=i+1)})})});
  sv();document.getElementById('imp')?.remove();render();
  const parts=[`${data.length} picks`];if(dupes)parts.push(`${dupes} dupes removed`);if(rc)parts.push(`${rc} resolved`);if(matched)parts.push(`${matched} matched`);
  toast(`Imported ${parts.join(' · ')}!`)}catch(e){toast('Invalid JSON');console.error(e)}};
window.clr=()=>{if(!confirm('Clear ALL data (NBA + MLB)?'))return;S.days={};sv();document.getElementById('imp')?.remove();render();toast('Cleared all data')};
render();
</script>
