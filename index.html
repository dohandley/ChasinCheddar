.btn-d{border-color:var(--red-border);color:var(--red-text);background:var(--red-bg)}.btn-d:hover{border-color:var(--red-text)}

.nav{background:var(--surface);border-bottom:1px solid var(--border);transition:all .2s}.nav-in{max-width:1140px;margin:0 auto;display:flex;align-items:center;padding:0 24px;gap:0}.sp{padding:9px 14px;border:none;background:transparent;color:var(--text-3);cursor:pointer;font-weight:700;font-size:12.5px;font-family:'Manrope',sans-serif;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:5px}.sp.on{color:var(--text);border-bottom-color:var(--green)}.sp:hover:not(.on){color:var(--text-2)}.sp .badge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-3)}.ndiv{width:1px;height:16px;background:var(--border);margin:0 6px}.nt{padding:9px 12px;border:none;background:transparent;color:var(--text-4);cursor:pointer;font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-family:'Manrope',sans-serif;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}.nt.on{color:var(--text);border-bottom-color:var(--green)}.nt:hover:not(.on){color:var(--text-2)}
.body{max-width:1140px;margin:0 auto;padding:20px 24px 80px}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}[data-theme="dark"] .mbg{background:rgba(0,0,0,.55)}.mdl{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:500px;max-width:92vw;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}.mdl h3{font-weight:800;font-size:1rem;margin-bottom:12px;color:var(--text);letter-spacing:-.02em}textarea{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10.5px;width:100%;resize:vertical;min-height:170px;transition:all .2s}textarea:focus{outline:none;border-color:var(--text)}.callout{border-radius:6px;padding:10px 12px;font-size:11px;margin-bottom:12px;border:1px solid var(--amber-border);background:var(--amber-bg);color:var(--amber-text);font-weight:500;line-height:1.5}

<script>
const LS='cc7';
const FB_CFG={apiKey:"YOUR_API_KEY"};const FB_ON=!FB_CFG.apiKey.startsWith('YOUR');
const SP={nba:{e:'🏀',l:'NBA'},mlb:{e:'⚾',l:'MLB'}};
const GM={s:'gs',a:'ga',b:'gb',c:'gc'};
let S={v:'picks',sp:'nba',f:'all',q:'',sf:'all',lf:'all',days:{},theme:'light'};
function ld(){try{const d=JSON.parse(localStorage.getItem(LS));if(d)S={...S,...d}}catch(e){}}
function sv(){localStorage.setItem(LS,JSON.stringify(S))}
ld();document.documentElement.setAttribute('data-theme',S.theme||'light');
// ═══ DEDUP ON LOAD: remove duplicate picks from prior bad imports ═══
(function dedup(){let total=0;Object.keys(S.days).forEach(d=>{const pk=S.days[d].picks;if(!pk||!pk.length)return;const seen={};const clean=[];pk.forEach(p=>{const k=(p.player||'').toLowerCase().trim()+'|'+(p.market||'').toLowerCase().trim().replace(/[_\s]+/g,' ')+'|'+(p.side||'').toLowerCase()+'|'+(p.line||0)+'|'+p.date+'|'+(p.sport||'nba');if(seen[k]){const prev=seen[k];if(p.resolved&&!prev.resolved){const idx=clean.indexOf(prev);clean[idx]=p;seen[k]=p}total++}else{seen[k]=p;clean.push(p)}});S.days[d].picks=clean;['nba','mlb'].forEach(sp=>{['best_bets','lotto'].forEach(ls=>{const GO={S:0,A:1,B:2,C:3};const g=clean.filter(p=>p.sport===sp&&p.list===ls).sort((a,b)=>{if(ls==='best_bets'){const ga=GO[a.grade]!=null?GO[a.grade]:3;const gb=GO[b.grade]!=null?GO[b.grade]:3;if(ga!==gb)return ga-gb}return b.score-a.score});g.forEach((p,i)=>p.rank=i+1)})})});if(total){sv();console.log(`Dedup: removed ${total} duplicate picks`)}})();
const td=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const fD=(d,s)=>{const t=new Date(d+'T12:00:00');return s?t.toLocaleDateString('en-US',{month:'short',day:'numeric'}):t.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})};
const fO=v=>!v||v===0?'—':v>0?`+${v}`:`${v}`;
const fTime=t=>{if(!t)return'';const s=String(t).trim();if(/[ap]m/i.test(s))return s.replace(/\s*(ET|EST|EDT)$/i,'').trim()+' ET';const mt=s.match(/^(\d{1,2}):(\d{2})/);if(!mt)return s;let h=parseInt(mt[1]),min=mt[2],ampm='AM';if(h>=12){ampm='PM';if(h>12)h-=12}if(h===0)h=12;return`${h}:${min} ${ampm} ET`};
const sP=dp=>(dp||[]).filter(p=>(p.sport||'nba')===S.sp);
const aS=()=>Object.values(S.days).flatMap(d=>sP(d.picks));
const rS=()=>aS().filter(p=>p.resolved);
const tS=()=>sP((S.days[td()]||{picks:[]}).picks);
const sC=()=>{const c={};Object.values(S.days).forEach(d=>(d.picks||[]).forEach(p=>{const s=p.sport||'nba';c[s]=(c[s]||0)+1}));return c};

// ═══ NORMALIZE HELPERS FOR ROBUST MATCHING ═══
// Lowercase, trim, collapse whitespace/underscores so "batter_total_bases" matches "Batter Total Bases"
const nK=s=>(s||'').toString().toLowerCase().trim().replace(/[_\s]+/g,' ');
// Key 1: player + market + side + date (strict)
const mK=p=>nK(p.player)+'|'+nK(p.market)+'|'+nK(p.side)+'|'+(p.line||0)+'|'+p.date;
// Key 2: player + market + date (side might differ between over/under)
const mK2=p=>nK(p.player)+'|'+nK(p.market)+'|'+p.date;
// Key 3: player + date + line (market name format might differ entirely)
const mK3=p=>nK(p.player)+'|'+p.date+'|'+p.line;

function stats(){const allRes=rS().filter(p=>p.hit===true||p.hit===false),res=allRes.filter(p=>p.list==='best_bets'),hits=res.filter(p=>p.hit===true),tp=tS();const wr=res.length?Math.round(hits.length/res.length*100):0;
  let w=res.length*10,ret=0;hits.forEach(p=>{const o=p.best_odds;ret+=o>0?10+10*o/100:10+10*100/Math.abs(o)});const roi=w?Math.round((ret-w)/w*100):0;
  const sr=[...res].sort((a,b)=>b.date.localeCompare(a.date)||b.rank-a.rank);let stk=0,stT='';
  const dayPL={};res.forEach(p=>{if(!dayPL[p.date])dayPL[p.date]=0;const o=p.best_odds;if(p.hit){dayPL[p.date]+=o>0?(10*o/100):(10*100/Math.abs(o))}else dayPL[p.date]-=10});
  const sortedDays=Object.entries(dayPL).sort((a,b)=>b[0].localeCompare(a[0]));
  for(const[d,pl]of sortedDays){if(pl===0)continue;if(!stk){stT=pl>0?'W':'L';stk=1}else if((pl>0&&stT==='W')||(pl<0&&stT==='L'))stk++;else break}
  const bG={};allRes.forEach(p=>{if(!bG[p.grade])bG[p.grade]={t:0,h:0};bG[p.grade].t++;if(p.hit)bG[p.grade].h++});
  const bM={};allRes.forEach(p=>{if(!bM[p.market])bM[p.market]={t:0,h:0};bM[p.market].t++;if(p.hit)bM[p.market].h++});
  const bS={Over:{t:0,h:0},Under:{t:0,h:0}};allRes.forEach(p=>{const k=(p.side||'Over')[0].toUpperCase()+(p.side||'over').slice(1).toLowerCase();if(bS[k]){bS[k].t++;if(p.hit)bS[k].h++}});
  const dPL={};allRes.forEach(p=>{if(!dPL[p.date])dPL[p.date]=0;const o=p.best_odds;if(p.hit){dPL[p.date]+=o>0?(10*o/100):(10*100/Math.abs(o))}else dPL[p.date]-=10});
  const bbPL={};res.forEach(p=>{if(!bbPL[p.date])bbPL[p.date]=0;const o=p.best_odds;if(p.hit){bbPL[p.date]+=o>0?(10*o/100):(10*100/Math.abs(o))}else bbPL[p.date]-=10});
  const bL={best_bets:{t:0,h:0},lotto:{t:0,h:0}};allRes.forEach(p=>{const k=p.list||'best_bets';if(bL[k]){bL[k].t++;if(p.hit)bL[k].h++}});
  const cR=allRes.filter(p=>p.confirmed),nR=allRes.filter(p=>!p.confirmed);
  const allD=Object.keys(S.days).filter(d=>sP(S.days[d].picks).length>0).sort().reverse();
  // ═══ UNIT CALCULATIONS (1u per bet, payout based on odds) ═══
  const calcU=picks=>{let u=0;picks.forEach(p=>{const o=p.best_odds;if(p.hit===true)u+=o>0?o/100:100/Math.abs(o);else if(p.hit===false)u-=1});return Math.round(u*10)/10};
  const bbRes=allRes.filter(p=>p.list==='best_bets'),lotRes=allRes.filter(p=>p.list==='lotto');
  const bbU=calcU(bbRes),lotU=calcU(lotRes),totalU=calcU(allRes);
  const bbHits=bbRes.filter(p=>p.hit===true).length,bbDec=bbRes.filter(p=>p.hit===true||p.hit===false).length;

  return`<div class="ct">${sp.e} ${sp.l} History · ${ds.length} days</div><div class="tw"><table><thead><tr><th>Date</th><th>Picks</th><th>Win %</th><th>W-L</th><th>Avg EV</th><th>Top</th><th>P/L</th></tr></thead><tbody>${rows}</tbody></table></div>`}

  const dayRows=sortedDayKeys.map(d=>{const dy=st.dayU[d];const r=dy.dec?Math.round(dy.hits/dy.dec*100):0;return`<tr class="day-row" style="cursor:default"><td style="font-weight:600;white-space:nowrap">${fD(d)}</td><td style="text-align:center">${dy.picks}</td><td style="text-align:center">${dy.hits}</td><td style="text-align:center">${dy.miss}</td><td style="text-align:center;color:${rc(r)};font-weight:700">${dy.dec?r+'%':'—'}</td><td style="text-align:center;font-weight:700;color:${uc(dy.u)};font-family:'JetBrains Mono',monospace">${uFmt(dy.u)}</td></tr>`}).join('');
  const dailyBreakdown=`<div class="card"><div class="ct" style="margin-bottom:12px">📅 Daily Breakdown</div>

  // ROW 5: DAILY UNITS BAR CHART
  const plDays=Object.keys(st.dayU).sort().slice(-14);
  const plChart=`<div class="card"><div class="ct" style="margin-bottom:12px">📊 Daily Units (Last 14 Days)</div><div class="bar-chart" style="height:130px">${plDays.map(d=>{const v=st.dayU[d].u;const mx=Math.max(...plDays.map(x=>Math.abs(st.dayU[x].u)),0.1);return`<div class="bar-c"><div class="bar-v" style="color:${uc(v)}">${uFmt(v)}</div><div class="bar" style="height:${Math.max(4,Math.abs(v)/mx*100)}px;background:${v>=0?'var(--green)':'var(--red)'}"></div><div class="bar-l">${fD(d,1)}</div></div>`}).join('')}</div></div>`;

  return`<div class="cg">${overall}${donut}</div><div class="cg">${bySection}</div><div class="cg">${byGrade}${gradeChart}</div>${dailyBreakdown}${plChart}`}

function pgA(st){const sp=SP[S.sp];if(!st.total)return`<div class="card" style="text-align:center;padding:40px"><div style="color:var(--text-3)">Need resolved ${sp.l} picks.</div><br><button class="btn" onclick="loadD()">Load Demo</button></div>`;
  const B=(v,l,s,c)=>`<div><div style="font-size:2rem;font-weight:800;color:${c};letter-spacing:-.03em">${v}%</div><div style="font-size:10px;color:var(--text-4);font-family:'JetBrains Mono',monospace;margin-top:4px">${l} · ${s}</div></div>`;const oW=st.bS.Over.t?Math.round(st.bS.Over.h/st.bS.Over.t*100):0,uW=st.bS.Under.t?Math.round(st.bS.Under.h/st.bS.Under.t*100):0;const bbW=st.bL.best_bets.t?Math.round(st.bL.best_bets.h/st.bL.best_bets.t*100):0,ltW=st.bL.lotto.t?Math.round(st.bL.lotto.h/st.bL.lotto.t*100):0;
  const evB={'0-5':{t:0,h:0},'5-10':{t:0,h:0},'10-15':{t:0,h:0},'15+':{t:0,h:0}};rS().forEach(p=>{const k=p.ev>=15?'15+':p.ev>=10?'10-15':p.ev>=5?'5-10':'0-5';evB[k].t++;if(p.hit)evB[k].h++});const mkts=Object.entries(st.bM).sort((a,b)=>b[1].t-a[1].t);

  <div class="cg"><div class="ch"><div class="ct">Confirmed vs Single</div><div style="display:grid;grid-template-columns:1fr 1fr;text-align:center;padding:12px 0">${B(st.cW,'CONFIRMED',st.cN,'var(--green-text)')}${B(st.nW,'SINGLE',st.nN,'var(--text-3)')}</div></div><div class="ch"><div class="ct">Win Rate by EV</div><div class="tw" style="border:none"><table><thead><tr><th>EV Range</th><th>Bets</th><th>Win %</th></tr></thead><tbody>${Object.entries(evB).map(([r,d])=>{const w=d.t?Math.round(d.h/d.t*100):0;return`<tr><td style="font-family:'JetBrains Mono',monospace;font-weight:700">${r}%</td><td>${d.t}</td><td style="color:${w>=55?'var(--green-text)':w>=45?'var(--amber-text)':'var(--red-text)'}"><strong>${w}%</strong></td></tr>`}).join('')}</tbody></table></div></div></div>
  <div class="card"><div class="ct">${sp.e} Market Breakdown</div><div class="tw"><table><thead><tr><th>Market</th><th>Total</th><th>Hits</th><th>Win %</th><th style="width:28%">Accuracy</th></tr></thead><tbody>${mkts.map(([m,d])=>{const w=d.t?Math.round(d.h/d.t*100):0;return`<tr><td style="font-weight:700;color:var(--blue-text)">${m}</td><td>${d.t}</td><td>${d.h}</td><td style="color:${w>=55?'var(--green-text)':w>=45?'var(--amber-text)':'var(--red-text)'}"><strong>${w}%</strong></td><td><div style="width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="width:${w}%;height:100%;border-radius:2px;background:${w>=55?'var(--green)':w>=45?'var(--amber)':'var(--red)'}"></div></div></td></tr>`}).join('')}</tbody></table></div></div>`}

window.setF=(k,v)=>{S[k]=k==='f'?v.toLowerCase():v;sv();render()};
window.mr=(id,hit)=>{for(const d of Object.values(S.days)){const p=(d.picks||[]).find(p=>p.id===id);if(p){p.resolved=true;p.hit=hit;break}}sv();render();toast(hit===true?'✓ Hit!':hit===false?'✗ Miss':'— Push')};

window.clrSport=sp=>{const label=SP[sp]?.l||sp.toUpperCase();const other=sp==='nba'?'MLB':'NBA';if(!confirm(`Clear all ${label} picks? ${other} data will NOT be affected.`))return;let removed=0;for(const d of Object.keys(S.days)){const before=S.days[d].picks?.length||0;S.days[d].picks=(S.days[d].picks||[]).filter(p=>(p.sport||'nba')!==sp);removed+=before-(S.days[d].picks?.length||0);if(!S.days[d].picks.length)delete S.days[d]}sv();document.getElementById('imp')?.remove();render();toast(`Cleared ${removed} ${label} picks`)};

window.showImp=()=>{const m=document.createElement('div');m.className='mbg';m.id='imp';m.onclick=e=>{if(e.target===m)m.remove()};
  const sportCounts=sC();
  const clearBtns=Object.entries(SP).map(([k,v])=>{const n=sportCounts[k]||0;return n?`<button class="btn btn-d" onclick="clrSport('${k}')">${v.e} Clear ${v.l} (${n})</button>`:''}).filter(Boolean).join('');
  m.innerHTML=`<div class="mdl"><h3>Import Picks</h3>
    <div class="callout">Paste <strong>picks_log.json</strong> or <strong>picks_log_mlb.json</strong> contents, or upload the file directly. Tracker results auto-import.</div>
    <div id="dropzone" style="border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px;transition:all .15s" onclick="document.getElementById('filepick').click()" ondragover="event.preventDefault();this.style.borderColor='var(--green)';this.style.background='var(--green-bg)'" ondragleave="this.style.borderColor='var(--border)';this.style.background='transparent'" ondrop="event.preventDefault();this.style.borderColor='var(--border)';this.style.background='transparent';handleFile(event.dataTransfer.files[0])">
      <div style="font-size:1.3rem;margin-bottom:6px">📂</div><div style="font-weight:700;font-size:12px;color:var(--text-2)">Drop JSON file here or click to browse</div><div style="font-size:11px;color:var(--text-4);margin-top:3px">picks_log.json · picks_log_mlb.json</div>
      <input type="file" id="filepick" accept=".json" style="display:none" onchange="handleFile(this.files[0])"></div>

    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
      <div style="font-size:9px;font-weight:700;color:var(--text-4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px">Data Management</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${clearBtns}<button class="btn" onclick="loadD()">Load Demo</button><button class="btn btn-d" onclick="clr()">Clear All</button></div></div></div>`;
  document.body.appendChild(m)};
window.handleFile=f=>{if(!f)return;const r=new FileReader();r.onload=e=>{const ta=document.getElementById('id');if(ta)ta.value=e.target.result;document.getElementById('dropzone').innerHTML=`<div style="color:var(--green-text);font-weight:700;font-size:12px">✓ ${f.name} loaded</div><div style="font-size:11px;color:var(--text-4);margin-top:2px">Click Import to continue</div>`};r.readAsText(f)};
window.doImp=()=>{const raw=document.getElementById('id')?.value;if(!raw?.trim()){toast('Paste JSON first');return}
  try{let data=JSON.parse(raw);if(!Array.isArray(data)){if(typeof data==='object'){const p=[];Object.values(data).forEach(v=>{if(Array.isArray(v))p.push(...v);else if(v?.picks)p.push(...v.picks)});data=p}}
  if(!data.length){toast('No picks found');return}
  function nH(h,r){if(!r)return{hit:null,resolved:false};if(h==='win'||h===true)return{hit:true,resolved:true};if(h==='loss'||h===false)return{hit:false,resolved:true};if(h==='dnp')return{hit:'dnp',resolved:true};return{hit:null,resolved:true}}
  let rc=0,matched=0;const byD={};
  data.forEach((p,i)=>{const d=p.date||td();if(!byD[d])byD[d]=[];let gr=p.grade||(p.score>=68?'S':p.score>=52?'A':p.score>=38?'B':'C');gr=gr.replace(/[🔥✅⚠️📊⭐\s]+/g,'').trim()||'C';if(gr==='FIRE')gr='S';if(gr==='SOLID')gr='A';if(gr==='LEAN')gr='B';const{hit,resolved}=nH(p.hit,p.resolved);if(resolved)rc++;let list=p.list||(Math.abs(p.best_odds||0)>=300?'lotto':'best_bets');if(list==='lotto_plays')list='lotto';
    byD[d].push({id:p.id||`${d}-${p.sport||S.sp}-${i}`,sport:p.sport||S.sp,player:p.player||'?',game:p.game||'',game_time:p.game_time||'',market:p.market||'',side:p.side||'Over',line:p.line||0,best_odds:p.best_odds||0,best_book:p.best_book||'',ev:p.ev||0,kelly:p.kelly||0,coverage:p.coverage||0,score:p.score||0,grade:gr,list,dvp:p.dvp||0,boost:p.boost||1,proj_edge:p.proj_edge||0,confirmed:p.confirmed||false,actual_stat:p.actual_stat||null,hit,resolved,date:d,rank:p.rank||i+1})});

  // ═══ DEDUP INCOMING: remove duplicates within the JSON file itself ═══
  let dupes=0;
  Object.keys(byD).forEach(d=>{const seen={};const clean=[];
    byD[d].forEach(p=>{const k=nK(p.player)+'|'+nK(p.market)+'|'+nK(p.side)+'|'+(p.line||0)+'|'+p.date+'|'+(p.sport||'nba');
      if(seen[k]){dupes++;const prev=seen[k];if(p.resolved&&!prev.resolved){const idx=clean.indexOf(prev);clean[idx]=p;seen[k]=p}}
      else{seen[k]=p;clean.push(p)}});
    byD[d]=clean});

  // ═══ ROBUST MERGE: 3-tier normalized matching ═══
  Object.entries(byD).forEach(([d,picks])=>{if(S.days[d]){const ex=S.days[d].picks||[];
    // Build 3 lookup maps from EXISTING picks (most specific → least)
    const eM1={},eM2={},eM3={};
    ex.forEach(p=>{
      eM1[mK(p)]=p;                    // player+market+side+date (normalized)
      const k2=mK2(p);if(!eM2[k2])eM2[k2]=p;  // player+market+date
      const k3=mK3(p);if(!eM3[k3])eM3[k3]=p;  // player+date+line
    });
    const used=new Set();
    picks.forEach(p=>{
      // Try exact match first (player+market+side+date, all normalized/lowercased)
      let found=eM1[mK(p)];
      // Fallback 2: player+market+date (side might be capitalized differently or missing)
      if(!found){found=eM2[mK2(p)]}
      // Fallback 3: player+date+line (market name format might differ entirely, e.g. "batter_total_bases" vs "TB")
      if(!found){found=eM3[mK3(p)]}
      if(found&&!used.has(found.id)){
        used.add(found.id);matched++;
        // Update resolved status if incoming is resolved
        if(p.resolved){found.resolved=p.resolved;found.hit=p.hit;found.actual_stat=p.actual_stat}
        // Backfill missing fields
        if(!found.game&&p.game)found.game=p.game;
        if(!found.game_time&&p.game_time)found.game_time=p.game_time;
        if(p.score&&p.score>found.score)found.score=p.score;
      }else if(!found){ex.push(p)}
    });S.days[d].picks=ex}else S.days[d]={picks,imported:Date.now()};
    ['nba','mlb'].forEach(sp=>{['best_bets','lotto'].forEach(ls=>{const GO={S:0,A:1,B:2,C:3};const g=S.days[d].picks.filter(p=>p.sport===sp&&p.list===ls).sort((a,b)=>{if(ls==='best_bets'){const ga=GO[a.grade]!=null?GO[a.grade]:3;const gb=GO[b.grade]!=null?GO[b.grade]:3;if(ga!==gb)return ga-gb}return b.score-a.score});g.forEach((p,i)=>p.rank=i+1)})})});
  sv();document.getElementById('imp')?.remove();render();
  const parts=[`${data.length} picks`];if(dupes)parts.push(`${dupes} dupes removed`);if(rc)parts.push(`${rc} resolved`);if(matched)parts.push(`${matched} matched`);
  toast(`Imported ${parts.join(' · ')}!`)}catch(e){toast('Invalid JSON');console.error(e)}};
